exp_name: vv_rnsd_baseline
seed: 42
pol: vv

data:
  root: /media/sdb8TB/sentinel1/korea/speckle_ds   # build_speckle_ds.py 결과
  patch_size: 128
  batch_size: 16
  num_workers: 4
  augment: true

model:
  base_ch: 64
  ch_mults: [1, 2, 4, 8]
  num_res_blocks: 2
  attn_resolutions: [16]
  in_ch: 4                     # 1(noised r) + 3 cond(μ, D_A, shadow) concat
  out_ch: 1
  use_mcam: false              # 구 s/cs MCAM 폐기, 새 설계는 input concat
  use_tccam: false

diffusion:
  T: 1000
  beta_start: 1.0e-4
  beta_end: 2.0e-2
  schedule: linear
  loss: l2

train:
  lr: 8.0e-5
  optimizer: adam
  grad_accum_steps: 2
  total_iters: 200000
  ema_decay: 0.995
  log_every: 100
  val_every: 2000
  ckpt_every: 5000

sampling:
  method: dips_basic
  steps: 30
  t_last: 4
  r: 10.0
  eta: 0.0
